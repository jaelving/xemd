name: Build & Publish Docker Images

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  HOST_IMAGE: ghcr.io/${{ github.repository_owner }}/xemd-host
  API_IMAGE: ghcr.io/${{ github.repository_owner }}/xemd-api

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Extract metadata (host)
        id: meta-host
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6
        with:
          images: ${{ env.HOST_IMAGE }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Extract metadata (api)
        id: meta-api
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6
        with:
          images: ${{ env.API_IMAGE }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      # Build single-platform images locally for scanning before push
      - name: Build host image (scan)
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          context: .
          file: apps/host/Dockerfile
          platforms: linux/amd64
          push: false
          load: true
          tags: xemd-host:scan
          cache-from: type=gha,scope=xemd-host

      - name: Build API image (scan)
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          context: .
          file: apps/api/Dockerfile
          platforms: linux/amd64
          push: false
          load: true
          tags: xemd-api:scan
          cache-from: type=gha,scope=xemd-api

      - name: Scan host image
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          image-ref: xemd-host:scan
          format: sarif
          output: trivy-host.sarif
          severity: CRITICAL,HIGH
          exit-code: "1"

      - name: Scan API image
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          image-ref: xemd-api:scan
          format: sarif
          output: trivy-api.sarif
          severity: CRITICAL,HIGH
          exit-code: "1"

      - name: Upload Trivy results (host) to GitHub Security
        uses: github/codeql-action/upload-sarif@ce64ddcb0d8d890d2df4a9d1c04ff297367dea2a # v3.35.2
        if: always()
        with:
          sarif_file: trivy-host.sarif
          category: trivy-host

      - name: Upload Trivy results (api) to GitHub Security
        uses: github/codeql-action/upload-sarif@ce64ddcb0d8d890d2df4a9d1c04ff297367dea2a # v3.35.2
        if: always()
        with:
          sarif_file: trivy-api.sarif
          category: trivy-api

      # Push multi-platform images only after scans pass (not on PRs)
      - name: Push host image
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          context: .
          file: apps/host/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta-host.outputs.tags }}
          labels: ${{ steps.meta-host.outputs.labels }}
          cache-from: type=gha,scope=xemd-host
          cache-to: type=gha,scope=xemd-host,mode=max

      - name: Push API image
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          context: .
          file: apps/api/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta-api.outputs.tags }}
          labels: ${{ steps.meta-api.outputs.labels }}
          cache-from: type=gha,scope=xemd-api
          cache-to: type=gha,scope=xemd-api,mode=max
