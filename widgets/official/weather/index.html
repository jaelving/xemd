<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0a0f;
      color: #e8e8f0;
      font-family: system-ui, -apple-system, sans-serif;
      width: 2560px;
      height: 720px;
      overflow: hidden;
      display: flex;
      align-items: stretch;
      padding: 28px 32px;
      gap: 24px;
      user-select: none;
      background-image: radial-gradient(ellipse at 20% 50%, rgba(59,130,246,0.06) 0%, transparent 60%),
                        radial-gradient(ellipse at 80% 20%, rgba(99,102,241,0.05) 0%, transparent 50%);
    }

    /* Cards */
    .card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      padding: 32px 36px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      backdrop-filter: blur(12px);
    }

    /* Left panel — current conditions */
    #panel-current {
      flex: 0 0 860px;
    }

    .location-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }

    .location-row svg {
      flex-shrink: 0;
    }

    .location-text {
      font-size: 1.4rem;
      font-weight: 500;
      color: rgba(255,255,255,0.45);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .condition-row {
      display: flex;
      align-items: center;
      gap: 18px;
      margin-bottom: 4px;
    }

    .condition-emoji {
      font-size: 5.5rem;
      line-height: 1;
    }

    .condition-desc {
      font-size: 2rem;
      font-weight: 300;
      color: rgba(255,255,255,0.5);
    }

    .temp-main {
      font-size: 9rem;
      font-weight: 100;
      letter-spacing: -0.05em;
      line-height: 1;
      background: linear-gradient(to bottom, #ffffff 0%, rgba(255,255,255,0.55) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin: 8px 0 4px;
    }

    .temp-unit {
      font-size: 3.5rem;
      font-weight: 300;
    }

    .feels-like {
      font-size: 1.5rem;
      font-weight: 300;
      color: rgba(255,255,255,0.3);
      margin-bottom: 24px;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: auto;
    }

    .stat-pill {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 12px;
      padding: 12px 18px;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .stat-label {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 0.85rem;
      font-weight: 500;
      color: rgba(255,255,255,0.3);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .stat-value {
      font-size: 1.45rem;
      font-weight: 400;
      color: rgba(255,255,255,0.78);
    }

    /* Center panel — hourly */
    #panel-hourly {
      flex: 1 1 0;
    }

    .panel-header {
      font-size: 1rem;
      font-weight: 600;
      color: rgba(255,255,255,0.28);
      text-transform: uppercase;
      letter-spacing: 0.12em;
      margin-bottom: 18px;
      flex-shrink: 0;
    }

    .hourly-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
      flex: 1;
      overflow: hidden;
    }

    .hourly-row {
      display: flex;
      align-items: center;
      padding: 10px 16px;
      border-radius: 12px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.05);
      transition: background 0.15s;
    }

    .hourly-row.is-now {
      background: rgba(255,255,255,0.08);
      border-color: rgba(255,255,255,0.14);
    }

    .hourly-time {
      width: 120px;
      font-size: 1.3rem;
      font-weight: 500;
      color: rgba(255,255,255,0.45);
    }

    .hourly-row.is-now .hourly-time {
      color: rgba(255,255,255,0.9);
    }

    .hourly-icon {
      width: 52px;
      font-size: 1.6rem;
      text-align: center;
    }

    .hourly-temp {
      flex: 1;
      font-size: 1.4rem;
      font-weight: 400;
      color: rgba(255,255,255,0.7);
      text-align: right;
    }

    .hourly-row.is-now .hourly-temp {
      color: #ffffff;
      font-weight: 600;
    }

    /* Right panel — 5-day + tiles */
    #panel-forecast {
      flex: 0 0 580px;
    }

    .forecast-list {
      display: flex;
      flex-direction: column;
      gap: 7px;
      margin-bottom: 18px;
    }

    .forecast-row {
      display: flex;
      align-items: center;
      padding: 10px 16px;
      border-radius: 12px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.05);
      transition: border-color 0.15s;
    }

    .forecast-row:hover {
      border-color: rgba(255,255,255,0.12);
    }

    .forecast-day {
      width: 140px;
      font-size: 1.25rem;
      font-weight: 500;
      color: rgba(255,255,255,0.6);
    }

    .forecast-icon {
      width: 44px;
      font-size: 1.5rem;
      text-align: center;
    }

    .forecast-temps {
      flex: 1;
      display: flex;
      justify-content: flex-end;
      align-items: baseline;
      gap: 12px;
    }

    .forecast-high {
      font-size: 1.35rem;
      font-weight: 600;
      color: rgba(255,255,255,0.88);
    }

    .forecast-low {
      font-size: 1.1rem;
      font-weight: 300;
      color: rgba(255,255,255,0.32);
    }

    .tiles-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: auto;
    }

    .info-tile {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 14px;
      padding: 16px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      gap: 6px;
    }

    .tile-label {
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: rgba(255,255,255,0.28);
    }

    .tile-value {
      font-size: 2.2rem;
      font-weight: 700;
      color: rgba(255,255,255,0.85);
    }

    .tile-sub {
      font-size: 0.9rem;
      font-weight: 400;
      color: rgba(255,255,255,0.3);
    }

    .uv-low  { color: #4ade80; }
    .uv-mid  { color: #fb923c; }
    .uv-high { color: #f87171; }

    .precip-value { color: #60a5fa; }

    /* Loading / Error */
    #loading-overlay {
      position: fixed;
      inset: 0;
      background: #0a0a0f;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      transition: opacity 0.4s;
    }

    #loading-overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .loading-text {
      font-size: 1.5rem;
      color: rgba(255,255,255,0.2);
      letter-spacing: 0.08em;
    }

    .loading-dot {
      display: inline-block;
      animation: dot-pulse 1.4s infinite both;
    }
    .loading-dot:nth-child(2) { animation-delay: 0.2s; }
    .loading-dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes dot-pulse {
      0%, 80%, 100% { opacity: 0.2; }
      40% { opacity: 1; }
    }

    #error-msg {
      display: none;
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(248,113,113,0.1);
      border: 1px solid rgba(248,113,113,0.3);
      color: #f87171;
      padding: 10px 24px;
      border-radius: 8px;
      font-size: 1rem;
      z-index: 200;
    }
  </style>
</head>

  <script type="module">
    import { xemd } from '/sdk/widget-sdk.js';

    // Weather code → emoji + description
    function weatherInfo(code) {
      if (code === 0)                         return { emoji: '☀️',  desc: 'Clear sky' };
      if (code === 1)                         return { emoji: '🌤️', desc: 'Mainly clear' };
      if (code === 2)                         return { emoji: '⛅',  desc: 'Partly cloudy' };
      if (code === 3)                         return { emoji: '☁️',  desc: 'Overcast' };
      if (code === 45 || code === 48)         return { emoji: '🌫️', desc: 'Foggy' };
      if (code >= 51 && code <= 57)           return { emoji: '🌦️', desc: 'Drizzle' };
      if (code >= 61 && code <= 67)           return { emoji: '🌧️', desc: 'Rain' };
      if ((code >= 71 && code <= 77) ||
          code === 85 || code === 86)         return { emoji: '❄️',  desc: 'Snow' };
      if (code >= 80 && code <= 82)           return { emoji: '🌨️', desc: 'Showers' };
      if (code === 95 || code === 96 ||
          code === 99)                        return { emoji: '⛈️',  desc: 'Thunderstorm' };
      return { emoji: '🌡️', desc: 'Unknown' };
    }

    // Wind direction
    function windDir(deg) {
      const dirs = ['N','NE','E','SE','S','SW','W','NW'];
      return dirs[Math.round(deg / 45) % 8];
    }

    // Time formatting
    function fmtTime(isoString) {
      return new Date(isoString).toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true });
    }

    function fmtHour(isoString) {
      const h = new Date(isoString).getHours();
      if (h === 0)  return '12 AM';
      if (h === 12) return '12 PM';
      return h < 12 ? `${h} AM` : `${h - 12} PM`;
    }

    function dayName(isoDateStr) {
      const [y, m, d] = isoDateStr.split('-').map(Number);
      return new Date(y, m - 1, d).toLocaleDateString('en-US', { weekday: 'long' });
    }

    // UV label
    function uvLabel(uv) {
      if (uv < 3)  return { text: 'Low',      cls: 'uv-low' };
      if (uv < 7)  return { text: 'Moderate', cls: 'uv-mid' };
      return              { text: 'High',     cls: 'uv-high' };
    }

    function rt(v) { return Math.round(v); }

    function resolveCity(value) {
      // Accept city-name label (new) or fall back to London
      return CITY_DATA[value] ?? CITY_DATA["London, United Kingdom"];
    }

    // Fetch & render
    async function fetchAndRender() {
      const settings  = await xemd.settings.get();
      const cityEntry = resolveCity(settings.city);
      const lat       = cityEntry.lat;
      const lon       = cityEntry.lon;
      const loc       = settings.city ?? 'London, United Kingdom';
      const units     = settings.units === 'celsius' ? 'celsius' : 'fahrenheit';
      const unitLabel = units === 'celsius' ? '°C' : '°F';
      const speedUnit = units === 'celsius' ? 'km/h' : 'mph';

      const url =
        `https://api.open-meteo.com/v1/forecast` +
        `?latitude=${lat}&longitude=${lon}` +
        `&current=temperature_2m,apparent_temperature,relative_humidity_2m,` +
        `weather_code,wind_speed_10m,wind_direction_10m` +
        `&hourly=temperature_2m,weather_code` +
        `&daily=weather_code,temperature_2m_max,temperature_2m_min,` +
        `sunrise,sunset,uv_index_max,precipitation_probability_max` +
        `&temperature_unit=${units}` +
        `&wind_speed_unit=${units === 'celsius' ? 'kmh' : 'mph'}` +
        `&timezone=auto` +
        `&forecast_days=6`;

      let data;
      try {
        const resp = await xemd.proxy.fetch(url);
        data = await resp.json();
      } catch (err) {
        showError('Failed to load weather data.');
        return;
      }

      hideError();

      const c   = data.current;
      const hr  = data.hourly;
      const day = data.daily;
      const info = weatherInfo(c.weather_code);

      // Left panel
      document.getElementById('cur-location').textContent = loc;
      document.getElementById('cur-emoji').textContent    = info.emoji;
      document.getElementById('cur-desc').textContent     = info.desc;
      document.getElementById('cur-temp').textContent     = rt(c.temperature_2m);
      document.getElementById('cur-unit').textContent     = unitLabel;
      document.getElementById('cur-feels').textContent    = `Feels like ${rt(c.apparent_temperature)}${unitLabel}`;
      document.getElementById('cur-humidity').textContent = `${c.relative_humidity_2m}%`;
      document.getElementById('cur-wind').textContent     = `${rt(c.wind_speed_10m)} ${speedUnit} ${windDir(c.wind_direction_10m)}`;
      document.getElementById('cur-sunrise').textContent  = fmtTime(day.sunrise[0]);
      document.getElementById('cur-sunset').textContent   = fmtTime(day.sunset[0]);

      // Hourly panel
      const now = new Date();
      const currentHourISO = now.toISOString().slice(0, 13);
      let startIdx = hr.time.findIndex(t => t.startsWith(currentHourISO));
      if (startIdx < 0) startIdx = 0;

      const hourlyList = document.getElementById('hourly-list');
      hourlyList.innerHTML = '';

      const hoursToShow = Math.min(10, hr.time.length - startIdx);
      for (let i = 0; i < hoursToShow; i++) {
        const idx = startIdx + i;
        const wi  = weatherInfo(hr.weather_code[idx]);
        const row = document.createElement('div');
        row.className = 'hourly-row' + (i === 0 ? ' is-now' : '');
        row.innerHTML = `
          <div class="hourly-time">${i === 0 ? 'Now' : fmtHour(hr.time[idx])}</div>
          <div class="hourly-icon">${wi.emoji}</div>
          <div class="hourly-temp">${rt(hr.temperature_2m[idx])}${unitLabel}</div>
        `;
        hourlyList.appendChild(row);
      }

      // 5-Day panel
      const forecastList = document.getElementById('forecast-list');
      forecastList.innerHTML = '';

      for (let i = 1; i <= 5; i++) {
        if (i >= day.time.length) break;
        const wi  = weatherInfo(day.weather_code[i]);
        const row = document.createElement('div');
        row.className = 'forecast-row';
        row.innerHTML = `
          <div class="forecast-day">${dayName(day.time[i])}</div>
          <div class="forecast-icon">${wi.emoji}</div>
          <div class="forecast-temps">
            <span class="forecast-high">${rt(day.temperature_2m_max[i])}${unitLabel}</span>
            <span class="forecast-low">${rt(day.temperature_2m_min[i])}${unitLabel}</span>
          </div>
        `;
        forecastList.appendChild(row);
      }

      // Tiles
      const uvVal  = Math.round(day.uv_index_max[0] ?? 0);
      const uvInfo = uvLabel(uvVal);
      const uvEl   = document.getElementById('tile-uv');
      uvEl.textContent = uvVal;
      uvEl.className   = `tile-value ${uvInfo.cls}`;
      document.getElementById('tile-uv-sub').textContent = uvInfo.text;

      document.getElementById('tile-precip').textContent =
        `${day.precipitation_probability_max[0] ?? 0}%`;

      document.getElementById('loading-overlay').classList.add('hidden');
    }

    function showError(msg) {
      const el = document.getElementById('error-msg');
      el.textContent = msg;
      el.style.display = '';
    }

    function hideError() {
      document.getElementById('error-msg').style.display = 'none';
    }

    await fetchAndRender();
    xemd.onRefresh(fetchAndRender);
    xemd.ready();
  </script>
