<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0a10;
      color: #e5e5f0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Header */
    #header {
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      gap: 2rem;
      padding: 0 2rem;
      height: 72px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      background: rgba(255,255,255,0.02);
    }

    #header-left {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      flex: 1;
    }

    #btc-icon {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: linear-gradient(135deg, #f7931a, #e8820c);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      font-weight: 900;
      color: #fff;
      flex-shrink: 0;
    }

    #header-title {
      font-size: 1.25rem;
      font-weight: 700;
      letter-spacing: -0.01em;
      color: #fff;
    }

    #header-subtitle {
      font-size: 0.8rem;
      color: rgba(255,255,255,0.35);
    }

    #header-stats {
      display: flex;
      gap: 2rem;
      align-items: center;
    }

    .header-stat {
      text-align: right;
    }

    .header-stat-label {
      font-size: 0.7rem;
      color: rgba(255,255,255,0.35);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.15rem;
    }

    .header-stat-value {
      font-size: 1rem;
      font-weight: 600;
      color: #fff;
    }

    /* Cards container */
    #cards {
      flex: 1 1 0;
      display: flex;
      gap: 1px;
      padding: 1.25rem;
      gap: 1.25rem;
      overflow: hidden;
    }

    /* Coin card */
    .coin-card {
      flex: 1 1 0;
      min-width: 0;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 16px;
      padding: 1.25rem 1.25rem 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.65rem;
      transition: border-color 0.2s, background 0.2s;
      position: relative;
      overflow: hidden;
    }

    .coin-card::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 16px;
      background: linear-gradient(135deg, rgba(255,255,255,0.03) 0%, transparent 60%);
      pointer-events: none;
    }

    /* Card top row */
    .card-top {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      position: relative;
    }

    .coin-img {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      flex-shrink: 0;
      background: rgba(255,255,255,0.06);
    }

    .coin-identity {
      flex: 1;
      min-width: 0;
    }

    .coin-symbol {
      font-size: 0.95rem;
      font-weight: 700;
      color: #fff;
      letter-spacing: 0.02em;
      text-transform: uppercase;
    }

    .coin-name {
      font-size: 0.72rem;
      color: rgba(255,255,255,0.4);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .coin-rank {
      font-size: 0.65rem;
      font-weight: 600;
      color: rgba(255,255,255,0.25);
      background: rgba(255,255,255,0.05);
      border-radius: 6px;
      padding: 2px 6px;
      letter-spacing: 0.03em;
    }

    /* Price row */
    .price-row {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 0.5rem;
    }

    .coin-price {
      font-size: 1.6rem;
      font-weight: 700;
      color: #fff;
      letter-spacing: -0.02em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
      min-width: 0;
    }

    .change-badge {
      flex-shrink: 0;
      font-size: 0.75rem;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 8px;
      letter-spacing: 0.01em;
    }

    .change-badge.positive {
      background: rgba(16, 185, 129, 0.15);
      color: #34d399;
      border: 1px solid rgba(16, 185, 129, 0.2);
    }

    .change-badge.negative {
      background: rgba(239, 68, 68, 0.15);
      color: #f87171;
      border: 1px solid rgba(239, 68, 68, 0.2);
    }

    .change-badge.neutral {
      background: rgba(255,255,255,0.06);
      color: rgba(255,255,255,0.4);
      border: 1px solid rgba(255,255,255,0.08);
    }

    /* Sparkline */
    .sparkline-wrap {
      flex: 1;
      min-height: 0;
      display: flex;
      align-items: center;
    }

    .sparkline {
      width: 100%;
      height: 52px;
      display: block;
      overflow: visible;
    }

    /* Footer */
    .card-footer {
      display: flex;
      justify-content: space-between;
      gap: 0.5rem;
    }

    .footer-stat {
      flex: 1;
      min-width: 0;
    }

    .footer-label {
      font-size: 0.62rem;
      color: rgba(255,255,255,0.3);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.15rem;
    }

    .footer-value {
      font-size: 0.78rem;
      font-weight: 600;
      color: rgba(255,255,255,0.65);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* States */
    #state-overlay {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      background: #0a0a10;
      z-index: 10;
    }

    #state-overlay.hidden { display: none; }

    .state-icon {
      font-size: 3rem;
      opacity: 0.4;
    }

    .state-text {
      font-size: 1rem;
      color: rgba(255,255,255,0.4);
    }

    .loading-dots span {
      animation: blink 1.4s infinite both;
      opacity: 0;
    }
    .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
    .loading-dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes blink {
      0%, 80%, 100% { opacity: 0; }
      40% { opacity: 1; }
    }
  </style>
</head>
<body>

  <div id="state-overlay">
    <div class="state-icon">₿</div>
    <div class="state-text loading-dots">Loading<span>.</span><span>.</span><span>.</span></div>
  </div>

  <div id="header">
    <div id="header-left">
      <div id="btc-icon">₿</div>
      <div>
        <div id="header-title">Crypto Watchlist</div>
        <div id="header-subtitle">–</div>
      </div>
    </div>
    <div id="header-stats">
      <div class="header-stat">
        <div class="header-stat-label">Watchlist Market Cap</div>
        <div class="header-stat-value" id="total-mcap">–</div>
      </div>
      <div class="header-stat">
        <div class="header-stat-label">BTC Dominance</div>
        <div class="header-stat-value" id="btc-dominance">–</div>
      </div>
    </div>
  </div>

  <div id="cards"></div>

  <script type="module">
    import { xemd } from '/sdk/widget-sdk.js';

    // Sanitization

    function escapeHtml(str) {
      if (typeof str !== 'string') return '';
      return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;').replace(/'/g, '&#x27;');
    }

    function safeSrc(url) {
      if (typeof url === 'string' && url.startsWith('https://')) return url;
      return '';
    }

    // Formatting helpers

    function fmtPrice(n) {
      if (n == null) return '–';
      if (n >= 1000) return '$' + n.toLocaleString('en-US', { maximumFractionDigits: 2, minimumFractionDigits: 2 });
      if (n >= 1) return '$' + n.toLocaleString('en-US', { maximumFractionDigits: 4, minimumFractionDigits: 2 });
      // small price — find first significant digits
      if (n <= 0) return '$0';
      const s = n.toPrecision(4);
      return '$' + parseFloat(s).toString();
    }

    function fmtMarketCap(n) {
      if (n == null) return '–';
      if (n >= 1e12) return '$' + (n / 1e12).toFixed(2) + 'T';
      if (n >= 1e9)  return '$' + (n / 1e9).toFixed(1) + 'B';
      if (n >= 1e6)  return '$' + (n / 1e6).toFixed(1) + 'M';
      return '$' + n.toLocaleString('en-US');
    }

    function fmtPct(n) {
      if (n == null) return '0.00%';
      const abs = Math.abs(n).toFixed(2);
      const arrow = n >= 0 ? '▲' : '▼';
      return `${arrow} ${abs}%`;
    }

    function fmtTime(d) {
      return d.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: true });
    }

    // Sparkline SVG builder

    function buildSparkline(prices, positive) {
      if (!prices || prices.length < 2) {
        return `<svg class="sparkline" viewBox="0 0 200 52" preserveAspectRatio="none"></svg>`;
      }

      // Downsample to ~30 points
      const target = 30;
      let pts = prices;
      if (pts.length > target) {
        const step = (pts.length - 1) / (target - 1);
        pts = Array.from({ length: target }, (_, i) => pts[Math.round(i * step)]);
      }

      const minV = Math.min(...pts);
      const maxV = Math.max(...pts);
      const range = maxV - minV || 1;

      const W = 200, H = 52, PAD = 2;
      const scaleX = (i) => PAD + (i / (pts.length - 1)) * (W - PAD * 2);
      const scaleY = (v) => PAD + (1 - (v - minV) / range) * (H - PAD * 2);

      const pathPoints = pts.map((v, i) => `${scaleX(i).toFixed(1)},${scaleY(v).toFixed(1)}`).join(' ');

      // Build path string
      const linePath = 'M ' + pathPoints.split(' ').join(' L ');
      const firstX = scaleX(0).toFixed(1);
      const lastX = scaleX(pts.length - 1).toFixed(1);
      const fillPath = `${linePath} L ${lastX},${H} L ${firstX},${H} Z`;

      const lineColor = positive ? '#10b981' : '#ef4444';
      const gradId = `sg_${Math.random().toString(36).slice(2, 8)}`;
      const gradTop = positive ? 'rgba(16,185,129,0.35)' : 'rgba(239,68,68,0.35)';
      const gradBot = positive ? 'rgba(16,185,129,0.02)' : 'rgba(239,68,68,0.02)';

      return `<svg class="sparkline" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
        <defs>
          <linearGradient id="${gradId}" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="${gradTop}"/>
            <stop offset="100%" stop-color="${gradBot}"/>
          </linearGradient>
        </defs>
        <path d="${fillPath}" fill="url(#${gradId})" stroke="none"/>
        <path d="${linePath}" fill="none" stroke="${lineColor}" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/>
      </svg>`;
    }

    // DOM helpers

    function renderCards(coins) {
      const container = document.getElementById('cards');
      container.innerHTML = '';

      for (const coin of coins) {
        const change24h = coin.price_change_percentage_24h;
        const change7d = coin.price_change_percentage_7d_in_currency;

        const changePct = change24h;
        const isPos = changePct >= 0;
        const isNeutral = changePct == null;
        const badgeClass = isNeutral ? 'neutral' : (isPos ? 'positive' : 'negative');
        const sparkPositive = change7d != null ? change7d >= 0 : isPos;

        const sparklineHTML = buildSparkline(coin.sparkline_in_7d?.price, sparkPositive);

        const card = document.createElement('div');
        card.className = 'coin-card';
        card.innerHTML = `
          <div class="card-top">
            <img class="coin-img" src="${safeSrc(coin.image)}" alt="${escapeHtml(coin.symbol)}" loading="lazy" onerror="this.style.opacity='0.2'"/>
            <div class="coin-identity">
              <div class="coin-symbol">${escapeHtml(coin.symbol)}</div>
              <div class="coin-name">${escapeHtml(coin.name)}</div>
            </div>
            <div class="coin-rank">#${escapeHtml(String(coin.market_cap_rank ?? '–'))}</div>
          </div>
          <div class="price-row">
            <div class="coin-price">${fmtPrice(coin.current_price)}</div>
            <div class="change-badge ${badgeClass}">${fmtPct(changePct)}</div>
          </div>
          <div class="sparkline-wrap">${sparklineHTML}</div>
          <div class="card-footer">
            <div class="footer-stat">
              <div class="footer-label">Market Cap</div>
              <div class="footer-value">${fmtMarketCap(coin.market_cap)}</div>
            </div>
            <div class="footer-stat" style="text-align:right">
              <div class="footer-label">24h Volume</div>
              <div class="footer-value">${fmtMarketCap(coin.total_volume)}</div>
            </div>
          </div>
        `;
        container.appendChild(card);
      }
    }

    function renderHeader(coins) {
      const totalMcap = coins.reduce((sum, c) => sum + (c.market_cap || 0), 0);
      const btc = coins.find(c => c.id === 'bitcoin');

      document.getElementById('total-mcap').textContent = fmtMarketCap(totalMcap);
      document.getElementById('header-subtitle').textContent =
        `Last updated ${fmtTime(new Date())}`;

      // BTC dominance: btc market cap / total crypto mcap
      // CoinGecko /global would be ideal, but approximate with watchlist if BTC is present
      if (btc && btc.market_cap) {
        // Rough global estimate: BTC mcap / BTC dominance historically ~0.5, but we use ratio within watchlist as fallback
        // For a real value we'd need /global — show watchlist BTC share instead
        const btcShare = ((btc.market_cap / totalMcap) * 100).toFixed(1);
        document.getElementById('btc-dominance').textContent = `${btcShare}%`;
      } else {
        document.getElementById('btc-dominance').textContent = '–';
      }
    }

    function showOverlay(msg, icon = '₿') {
      const overlay = document.getElementById('state-overlay');
      overlay.classList.remove('hidden');
      overlay.innerHTML = `<div class="state-icon">${icon}</div><div class="state-text">${msg}</div>`;
    }

    function hideOverlay() {
      document.getElementById('state-overlay').classList.add('hidden');
    }

    // Data fetching

    async function fetchCoins(coinIds) {
      const ids = coinIds.trim().replace(/\s+/g, '');
      const url = `https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&ids=${ids}&order=market_cap_desc&sparkline=true&price_change_percentage=7d`;
      const res = await xemd.proxy.fetch(url);
      if (!res.ok) throw new Error(`CoinGecko API error: ${res.status}`);
      return res.json();
    }

    async function refresh(settings) {
      const coinIds = settings.coins ?? 'bitcoin,ethereum,solana,cardano,chainlink';
      let coins;
      try {
        coins = await fetchCoins(coinIds);
      } catch (err) {
        showOverlay(`Failed to load data: ${err.message}`, '⚠');
        return;
      }

      if (!coins || coins.length === 0) {
        showOverlay('No coins found. Check your Coin IDs setting.', '🔍');
        return;
      }

      renderCards(coins);
      renderHeader(coins);
      hideOverlay();
    }

    // Bootstrap

    let settings = await xemd.settings.get();
    await refresh(settings);

    xemd.onRefresh(() => refresh(settings));
    xemd.onSettingsChange((s) => { settings = s; refresh(s); });

    xemd.ready();
  </script>
</body>
</html>
