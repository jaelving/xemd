server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API calls, SDK, and widget static files to xemd-api
    location /api/ {
        proxy_pass http://xemd-api:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /sdk/ {
        proxy_pass http://xemd-api:3001;
        proxy_http_version 1.1;
    }

    location /widgets/ {
        proxy_pass http://xemd-api:3001;
        proxy_http_version 1.1;

        # Widget-specific security headers — override server-level headers.
        # Widgets use inline <script type="module"> so 'unsafe-inline' is needed.
        # connect-src 'none' blocks direct fetch('/api/...') calls — widgets must
        # use the SDK's postMessage channel. This prevents a community widget loaded
        # outside an iframe (direct navigation) from stealing secrets via the API.
        add_header Content-Security-Policy "default-src 'none'; script-src 'self' 'unsafe-inline' https://unpkg.com; style-src 'self' 'unsafe-inline' https://unpkg.com https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'none';" always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options SAMEORIGIN always;
        add_header Referrer-Policy strict-origin-when-cross-origin always;
    }

    # Security headers applied to all responses
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # Content-Security-Policy
    #
    # script-src:
    #   'self'               - SDK and host app scripts (same origin)
    #   https://unpkg.com    - Leaflet.js (flight-tracker widget)
    #
    # style-src:
    #   'self'               - host app styles
    #   'unsafe-inline'      - Tailwind utility classes (admin panel)
    #   https://unpkg.com    - Leaflet.css (flight-tracker widget)
    #   https://fonts.googleapis.com - F1 Schedule and Countdown widget fonts
    #
    # font-src:
    #   https://fonts.gstatic.com - Google Fonts binary files
    #
    # connect-src:
    #   'self'                           - API proxy calls
    #   https://*.basemaps.cartocdn.com  - Leaflet map tile XHR (flight-tracker)
    #
    # img-src:
    #   'self' data: https:              - coin images, map tiles, weather icons
    #
    # frame-src:
    #   'self'                           - widget iframes (served from same origin)
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://unpkg.com; style-src 'self' 'unsafe-inline' https://unpkg.com https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://*.basemaps.cartocdn.com; img-src 'self' data: https:; frame-src 'self';" always;
}
