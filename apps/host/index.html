<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>XEMD — Xeneon Edge Mac Dashboard</title>
    <!-- Anti-flash: apply theme before React mounts so there's no light→dark flicker -->
    <script>
      (function () {
        var t = localStorage.getItem('xemd-admin-theme');
        if (t !== 'light') document.documentElement.classList.add('dark');
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
